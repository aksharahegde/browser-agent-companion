name: cua_companion
description: Mac menu-bar companion bridging local desktop tools to Cloudflare Stateful Browser Agent.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  window_manager: ^0.5.1
  tray_manager: ^0.5.3
  hotkey_manager: ^0.2.3
  screen_capturer: ^0.2.3
  file_picker: ^11.0.2
  drift: ^2.34.0
  path_provider: ^2.1.5
  path: ^1.9.0
  web_socket_channel: ^3.0.1
  flutter_riverpod: ^3.3.2
  uuid: ^4.5.1
  intl: ^0.20.1
  launch_at_startup: ^0.5.1
  mime: ^2.0.0
  image: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  drift_dev: ^2.34.0
  build_runner: ^2.4.14

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
